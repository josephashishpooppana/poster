name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Flutter platforms
        working-directory: ./birthday_poster_app
        run: flutter create . --org com.rcdc --project-name birthday_poster_app

      - name: Fix Gradle duplicates and apply manifest
        working-directory: ./birthday_poster_app
        run: |
          rm -f android/app/build.gradle.kts
          rm -f android/build.gradle.kts
          rm -f android/settings.gradle.kts
          git checkout -- android/settings.gradle android/app/build.gradle android/build.gradle android/gradle.properties android/gradle/wrapper/gradle-wrapper.properties test/widget_test.dart
          cp android/notification_manifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        working-directory: ./birthday_poster_app
        run: flutter pub get

      - name: Run tests
        working-directory: ./birthday_poster_app
        run: flutter test

      - name: Build APK
        working-directory: ./birthday_poster_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: birthday-poster-apk
          path: birthday_poster_app/build/app/outputs/flutter-apk/app-release.apk
