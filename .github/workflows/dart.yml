# Builds a release APK in the cloud — no local Flutter install required.
# After it finishes: Actions tab → latest run → Artifacts → download birthday-poster-apk.zip

name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "birthday_poster_app/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: birthday_poster_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create platform folders
        run: flutter create . --project-name birthday_poster_app

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: birthday-poster-apk
          path: birthday_poster_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
